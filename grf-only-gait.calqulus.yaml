# GRF-Only Gait Analysis Pipeline
#
# Detects gait events and exports ground reaction force using force plate
# data only — no kinematics or skeleton required.
#
# Assumptions:
#   - ForcePlate1 = left foot, ForcePlate2 = right foot
#   - Body mass must be set as a session field in QTM (required for BW normalization)
#   - Threshold for event detection = 5% body weight (~20–35 N for a typical adult)
#
# Parameter and event names match the Qualisys web report template:
#   Left GRF / Right GRF          →  time series GRF plots
#   LON_force / LOFF_force        →  left gait cycle events
#   RON_force / ROFF_force        →  right gait cycle events


############
## EVENTS ##
############

- event: BOF
  steps:
    - import: [0]

- event: EOF
  steps:
    - subtract: [$length, 1]


# --- Event detection threshold: 5% body weight ---

- parameter: GRF_threshold
  steps:
    - multiply: [$bodyMass, 9.81]
    - multiply: [$prev, 0.05]


# --- Left foot (ForcePlate1): raw threshold events ---
# Low-pass filter reduces noise spikes before threshold crossing detection.

- event: LON_raw
  steps:
    - import: ForcePlate1.fz
    - lowpass:
      cutoff: 50
    - threshold: $prev
      value: GRF_threshold
      direction: up

- event: LOFF_raw
  steps:
    - import: ForcePlate1.fz
    - lowpass:
      cutoff: 50
    - threshold: $prev
      value: GRF_threshold
      direction: down


# --- Left foot: refined events (enforces strict ON→OFF alternation) ---

- event: LON_force
  set: left
  steps:
    - refineEvent: LON_raw
      sequence: [LON_raw, LOFF_raw]

- event: LOFF_force
  set: left
  steps:
    - refineEvent: LOFF_raw
      sequence: [LON_raw, LOFF_raw]


# --- Right foot (ForcePlate2): raw threshold events ---

- event: RON_raw
  steps:
    - import: ForcePlate2.fz
    - lowpass:
      cutoff: 50
    - threshold: $prev
      value: GRF_threshold
      direction: up

- event: ROFF_raw
  steps:
    - import: ForcePlate2.fz
    - lowpass:
      cutoff: 50
    - threshold: $prev
      value: GRF_threshold
      direction: down


# --- Right foot: refined events ---

- event: RON_force
  set: right
  steps:
    - refineEvent: RON_raw
      sequence: [RON_raw, ROFF_raw]

- event: ROFF_force
  set: right
  steps:
    - refineEvent: ROFF_raw
      sequence: [RON_raw, ROFF_raw]


#####################
## NORMALIZATION    ##
#####################

- parameter: BodyWeightNewton
  steps:
    - multiply: [$bodyMass, 9.81]


####################
## GRF TIME SERIES ##
####################
# Named to match the Qualisys web report template (Left GRF / Right GRF).
# eventMask is required — it annotates the signal with stance cycle pairs
# (LON → LOFF), which the report uses to normalize the x-axis to 0–100%.

- parameter: Left GRF
  set: left
  steps:
    - vector: [ForcePlate1.fx, ForcePlate1.fy, ForcePlate1.fz]
    - divide: [$prev, BodyWeightNewton]
    - eventMask: [$prev, LON_force, LOFF_force]

- parameter: Right GRF
  set: right
  steps:
    - vector: [ForcePlate2.fx, ForcePlate2.fy, ForcePlate2.fz]
    - divide: [$prev, BodyWeightNewton]
    - eventMask: [$prev, RON_force, ROFF_force]


########################
## TEMPORAL PARAMETERS ##
########################

# Stance duration: time from foot on to foot off (seconds)
- parameter: Left Stance Duration
  set: left
  steps:
    - eventDuration: [LON_force, LOFF_force]

- parameter: Right Stance Duration
  set: right
  steps:
    - eventDuration: [RON_force, ROFF_force]

# Step time: from one foot strike to the opposite foot strike (seconds)
- parameter: Left to Right Step Time
  steps:
    - eventDuration: [LON_force, RON_force]

- parameter: Right to Left Step Time
  steps:
    - eventDuration: [RON_force, LON_force]

# Gait cycle time: ipsilateral foot strike to next ipsilateral foot strike (seconds)
- parameter: Left Cycle Time
  set: left
  steps:
    - eventDuration: [LON_force, LON_force]

- parameter: Right Cycle Time
  set: right
  steps:
    - eventDuration: [RON_force, RON_force]


##########################
## LOADING PARAMETERS    ##
##########################

# Peak vertical GRF per stance phase (normalized to body weight)
- parameter: Left Peak vGRF
  set: left
  steps:
    - import: ForcePlate1.fz
    - divide: [$prev, BodyWeightNewton]
    - eventMask: [$prev, LON_force, LOFF_force]
    - max:

- parameter: Right Peak vGRF
  set: right
  steps:
    - import: ForcePlate2.fz
    - divide: [$prev, BodyWeightNewton]
    - eventMask: [$prev, RON_force, ROFF_force]
    - max:
