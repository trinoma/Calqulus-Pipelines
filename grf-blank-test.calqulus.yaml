- parameter: Left GRF
  set: left
  steps:
    - vector: [ForcePlate1.fx, ForcePlate1.fy, ForcePlate1.fz]
    - divide: [$prev, BodyWeightNewton]
    - eventMask: [$prev, LON_force, LOFF_force]

- parameter: Right GRF
  set: right
  steps:
    - vector: [ForcePlate2.fx, ForcePlate2.fy, ForcePlate2.fz]
    - divide: [$prev, BodyWeightNewton]
    - eventMask: [$prev, RON_force, ROFF_force]

# Stance duration: time from foot on to foot off (seconds)
- parameter: Left Stance Duration
  set: left
  steps:
    - eventDuration: [LON_force, LOFF_force]

- parameter: Right Stance Duration
  set: right
  steps:
    - eventDuration: [RON_force, ROFF_force]
