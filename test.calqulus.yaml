############################################################
# Calqulus Pipeline - Gait Analysis (Kinetics only)
# GRF-based Gait Event Detection + GRF output for report
############################################################

# ── SECTION 1: Gait Events from FootContact properties ──
# These are native QTM force plate contact assignments.
# .events.on  = frame where foot contacts force plate (Heel Strike)
# .events.off = frame where foot leaves force plate (Toe Off)

- event: Left_HeelStrike
  steps:
    - import: LeftFootContact.events.on

- event: Left_ToeOff
  steps:
    - import: LeftFootContact.events.off

- event: Right_HeelStrike
  steps:
    - import: RightFootContact.events.on

- event: Right_ToeOff
  steps:
    - import: RightFootContact.events.off

# ── SECTION 2: Import & filter GRF vertical component ──

- parameter: LeftGRF_vertical
  steps:
    - import: ForcePlate1.fz
    - lowpass:
        cutoff: 20
        order: 4

- parameter: RightGRF_vertical
  steps:
    - import: ForcePlate2.fz
    - lowpass:
        cutoff: 20
        order: 4

# ── SECTION 3: Segment GRF over each gait cycle (HS to HS) ──
# This is what drives the web report curves

- parameter: Left_GRF_cycle
  steps:
    - import: LeftGRF_vertical
    - eventMask:
        start: Left_HeelStrike
        end: Left_HeelStrike

- parameter: Right_GRF_cycle
  steps:
    - import: RightGRF_vertical
    - eventMask:
        start: Right_HeelStrike
        end: Right_HeelStrike

# ── SECTION 4: Scalar outputs — Peak GRF per cycle ──

- parameter: Left_PeakGRF
  steps:
    - import: Left_GRF_cycle
    - max:

- parameter: Right_PeakGRF
  steps:
    - import: Right_GRF_cycle
    - max:

# ── SECTION 5: Outputs for web report ──

- output: Left_HeelStrike
- output: Left_ToeOff
- output: Right_HeelStrike
- output: Right_ToeOff

- output: LeftGRF_vertical
- output: RightGRF_vertical

- output: Left_GRF_cycle
- output: Right_GRF_cycle

- output: Left_PeakGRF
- output: Right_PeakGRF
