# GRF Blank Test Template
#
# Diagnostic template with two key changes from the previous version:
#
# 1. All events use a raw 10 N threshold on the vertical force — no dependency
#    on LeftFootContact.events.on/off (which may not exist in the trial) and
#    no dependency on $bodyMass.
#
# 2. Task name filter removed from the top-level pipeline so this runs on
#    ANY force-plate trial regardless of task name.

############
## EVENTS ##
############

# Foot-contact events via raw force threshold (10 N — no $bodyMass needed)
- event: LON_force
  set: left
  where:
    force: left
  steps:
    - threshold: LeftFootContact.fz
      value: 10
      direction: up

- event: LOFF_force
  set: left
  where:
    force: left
  steps:
    - threshold: LeftFootContact.fz
      value: 10
      direction: down

- event: RON_force
  set: right
  where:
    force: right
  steps:
    - threshold: RightFootContact.fz
      value: 10
      direction: up

- event: ROFF_force
  set: right
  where:
    force: right
  steps:
    - threshold: RightFootContact.fz
      value: 10
      direction: down

# Standard gait event names
- event: LFS
  set: left
  where:
    force: left
  steps:
    - import: LON_force

- event: LTO
  set: left
  where:
    force: left
  steps:
    - import: LOFF_force

- event: RFS
  set: right
  where:
    force: right
  steps:
    - import: RON_force

- event: RTO
  set: right
  where:
    force: right
  steps:
    - import: ROFF_force

# Plot window events (stride-cycle convention: both start and end = LFS)
- event: LeftPlotStart
  set: left
  where:
    force: left
  steps:
    - import: LFS

- event: LeftPlotEnd
  set: left
  where:
    force: left
  steps:
    - import: LFS

- event: RightPlotStart
  set: right
  where:
    force: right
  steps:
    - import: RFS

- event: RightPlotEnd
  set: right
  where:
    force: right
  steps:
    - import: RFS

- event: LeftPlotStartForce
  set: left
  where:
    force: left
  steps:
    - import: LON_force

- event: LeftPlotEndForce
  set: left
  where:
    force: left
  steps:
    - import: LOFF_force

- event: RightPlotStartForce
  set: right
  where:
    force: right
  steps:
    - import: RON_force

- event: RightPlotEndForce
  set: right
  where:
    force: right
  steps:
    - import: ROFF_force

- event: LON
  set: left
  where:
    force: left
  steps:
    - import: LON_force

- event: RON
  set: right
  where:
    force: right
  steps:
    - import: RON_force

############
## SERIES ##
############

# Flat-zero GRF — shape from force plate, all values multiplied to 0.
- parameter: Left GRF
  set: left
  where:
    force: left
  steps:
    - vector: [LeftFootContact.fz, LeftFootContact.fz, LeftFootContact.fz]
    - multiply: [$prev, [0, 0, 0]]

- parameter: Right GRF
  set: right
  where:
    force: right
  steps:
    - vector: [RightFootContact.fz, RightFootContact.fz, RightFootContact.fz]
    - multiply: [$prev, [0, 0, 0]]

# Fake kinematics — flat-zero 3D series, same shape as force plate data.
- parameter: Left Hip Angles
  set: left
  where:
    force: left
  steps:
    - vector: [LeftFootContact.fz, LeftFootContact.fz, LeftFootContact.fz]
    - multiply: [$prev, [0, 0, 0]]

- parameter: Right Hip Angles
  set: right
  where:
    force: right
  steps:
    - vector: [RightFootContact.fz, RightFootContact.fz, RightFootContact.fz]
    - multiply: [$prev, [0, 0, 0]]

- parameter: Left Knee Angles
  set: left
  where:
    force: left
  steps:
    - vector: [LeftFootContact.fz, LeftFootContact.fz, LeftFootContact.fz]
    - multiply: [$prev, [0, 0, 0]]

- parameter: Right Knee Angles
  set: right
  where:
    force: right
  steps:
    - vector: [RightFootContact.fz, RightFootContact.fz, RightFootContact.fz]
    - multiply: [$prev, [0, 0, 0]]

- parameter: Left Ankle Angles
  set: left
  where:
    force: left
  steps:
    - vector: [LeftFootContact.fz, LeftFootContact.fz, LeftFootContact.fz]
    - multiply: [$prev, [0, 0, 0]]

- parameter: Right Ankle Angles
  set: right
  where:
    force: right
  steps:
    - vector: [RightFootContact.fz, RightFootContact.fz, RightFootContact.fz]
    - multiply: [$prev, [0, 0, 0]]

- parameter: Left Pelvic Angles
  set: left
  where:
    force: left
  steps:
    - vector: [LeftFootContact.fz, LeftFootContact.fz, LeftFootContact.fz]
    - multiply: [$prev, [0, 0, 0]]

- parameter: Right Pelvic Angles
  set: right
  where:
    force: right
  steps:
    - vector: [RightFootContact.fz, RightFootContact.fz, RightFootContact.fz]
    - multiply: [$prev, [0, 0, 0]]
