# Ground Reaction Force — Stance Phase
#
# Event detection is based solely on vertical force threshold (kinetics only).
# No kinematic marker data is required.
#
# Heel Strike (HS) = vertical GRF rising through the contact threshold.
# Toe Off    (TO)  = vertical GRF falling through the contact threshold.
#
# Threshold: 0.05 BW (5% of body weight). Adjust the value: 0.05 lines below
# if your capture conditions require different sensitivity.
#
# GRF components are reported in lab-frame coordinates:
#   x = mediolateral (ML)
#   y = anteroposterior (AP)
#   z = vertical (up)
# All forces are normalized to body weight (BW = $bodyMass × 9.81 N).

############
## EVENTS ##
############

- parameter: BodyWeightNewton
  steps:
    - multiply: [$bodyMass, 9.81]

# Left Heel Strike: vertical GRF rising through 5% BW
- event: LHS
  set: left
  where:
    force: left
  steps:
    - divide: [LeftFootContact.fz, BodyWeightNewton]
    - threshold: $prev
      value: 0.05
      direction: up

# Left Toe Off: vertical GRF falling through 5% BW
- event: LTO
  set: left
  where:
    force: left
  steps:
    - divide: [LeftFootContact.fz, BodyWeightNewton]
    - threshold: $prev
      value: 0.05
      direction: down

# Right Heel Strike
- event: RHS
  set: right
  where:
    force: right
  steps:
    - divide: [RightFootContact.fz, BodyWeightNewton]
    - threshold: $prev
      value: 0.05
      direction: up

# Right Toe Off
- event: RTO
  set: right
  where:
    force: right
  steps:
    - divide: [RightFootContact.fz, BodyWeightNewton]
    - threshold: $prev
      value: 0.05
      direction: down

# ---
# Hardware contact events — mirrors events-kinetics.calqulus.yaml from the running pipeline.
# These use the force-plate's built-in ON/OFF detection signals.
- event: LON_force
  set: left
  where:
    force: left
  steps:
    - import: LeftFootContact.events.on

- event: LOFF_force
  set: left
  where:
    force: left
  steps:
    - import: LeftFootContact.events.off

- event: RON_force
  set: right
  where:
    force: right
  steps:
    - import: RightFootContact.events.on

- event: ROFF_force
  set: right
  where:
    force: right
  steps:
    - import: RightFootContact.events.off

# ---
# Plot window events
# LeftPlotStart / LeftPlotEnd — kinematics window (stance phase, LHS→LTO).
# LeftPlotStartForce / LeftPlotEndForce — force graph window; uses hardware
# contact events to match the running-analysis report exactly.

- event: LeftPlotStart
  set: left
  where:
    force: left
  steps:
    - import: LHS

- event: LeftPlotEnd
  set: left
  where:
    force: left
  steps:
    - import: LTO

- event: LeftPlotStartForce
  set: left
  where:
    force: left
  steps:
    - import: LON_force

- event: LeftPlotEndForce
  set: left
  where:
    force: left
  steps:
    - import: LOFF_force

- event: RightPlotStart
  set: right
  where:
    force: right
  steps:
    - import: RHS

- event: RightPlotEnd
  set: right
  where:
    force: right
  steps:
    - import: RTO

- event: RightPlotStartForce
  set: right
  where:
    force: right
  steps:
    - import: RON_force

- event: RightPlotEndForce
  set: right
  where:
    force: right
  steps:
    - import: ROFF_force

# LON / RON: foot contact on events — must point to hardware events to
# match what the running-analysis report references by name.
- event: LON
  set: left
  where:
    force: left
  steps:
    - import: LON_force

- event: RON
  set: right
  where:
    force: right
  steps:
    - import: RON_force

# LFS / RFS: standard foot-strike names expected by the running report.
- event: LFS
  set: left
  where:
    force: left
  steps:
    - import: LHS

- event: RFS
  set: right
  where:
    force: right
  steps:
    - import: RHS

############
## SERIES ##
############

# GRF normalized to body weight — all three components in lab frame
- parameter: Left GRF
  set: left
  where:
    force: left
  steps:
    - vector: [LeftFootContact.fx, LeftFootContact.fy, LeftFootContact.fz]
    - divide: [$prev, BodyWeightNewton]

- parameter: Right GRF
  set: right
  where:
    force: right
  steps:
    - vector: [RightFootContact.fx, RightFootContact.fy, RightFootContact.fz]
    - divide: [$prev, BodyWeightNewton]

# Negated AP force — used internally to locate the braking peak
- parameter: Left_Braking_Force
  set: left
  where:
    force: left
  steps:
    - negate: Left GRF.y

- parameter: Right_Braking_Force
  set: right
  where:
    force: right
  steps:
    - negate: Right GRF.y

##############
## SCALARS  ##
##############

# --- Stance duration ---
- parameter: Left Stance Duration
  set: left
  where:
    force: left
  steps:
    - eventDuration: [LHS, LTO]
    - mean:

- parameter: Right Stance Duration
  set: right
  where:
    force: right
  steps:
    - eventDuration: [RHS, RTO]
    - mean:

# --- Vertical GRF peaks ---
# Walking produces a double-peak pattern.
# @1  = first peak (loading response, early stance)
# @-1 = last  peak (push-off, late stance)

- event: Left_GRF_Loading_Peak
  set: left
  where:
    force: left
  steps:
    - peakFinder: Left GRF.z
    - eventMask: [$prev, LHS, LTO]
    - import: $prev@1

- event: Left_GRF_Pushoff_Peak
  set: left
  where:
    force: left
  steps:
    - peakFinder: Left GRF.z
    - eventMask: [$prev, LHS, LTO]
    - import: $prev@-1

- event: Right_GRF_Loading_Peak
  set: right
  where:
    force: right
  steps:
    - peakFinder: Right GRF.z
    - eventMask: [$prev, RHS, RTO]
    - import: $prev@1

- event: Right_GRF_Pushoff_Peak
  set: right
  where:
    force: right
  steps:
    - peakFinder: Right GRF.z
    - eventMask: [$prev, RHS, RTO]
    - import: $prev@-1

- parameter: Left GRF.z@Left_GRF_Loading_Peak
  set: left
  where:
    force: left
  steps:
    - import: Left GRF.z@Left_GRF_Loading_Peak

- parameter: Left GRF.z@Left_GRF_Pushoff_Peak
  set: left
  where:
    force: left
  steps:
    - import: Left GRF.z@Left_GRF_Pushoff_Peak

- parameter: Right GRF.z@Right_GRF_Loading_Peak
  set: right
  where:
    force: right
  steps:
    - import: Right GRF.z@Right_GRF_Loading_Peak

- parameter: Right GRF.z@Right_GRF_Pushoff_Peak
  set: right
  where:
    force: right
  steps:
    - import: Right GRF.z@Right_GRF_Pushoff_Peak

# --- AP force peaks ---
# Sign convention (lab frame, subject walking in +y direction):
#   Braking    = negative GRF.y (early stance)
#   Propulsion = positive GRF.y (late stance)
# If the subject walks in a different lab direction, negate GRF.y as needed.

- event: Left_Braking_Peak
  set: left
  where:
    force: left
  steps:
    - peakFinder: Left_Braking_Force
    - eventMask: [$prev, LHS, LTO]
    - import: $prev@1

- event: Right_Braking_Peak
  set: right
  where:
    force: right
  steps:
    - peakFinder: Right_Braking_Force
    - eventMask: [$prev, RHS, RTO]
    - import: $prev@1

- event: Left_Propulsion_Peak
  set: left
  where:
    force: left
  steps:
    - peakFinder: Left GRF.y
    - eventMask: [$prev, LHS, LTO]
    - import: $prev@-1

- event: Right_Propulsion_Peak
  set: right
  where:
    force: right
  steps:
    - peakFinder: Right GRF.y
    - eventMask: [$prev, RHS, RTO]
    - import: $prev@-1

- parameter: Left GRF.y@Left_Braking_Peak
  set: left
  where:
    force: left
  steps:
    - import: Left GRF.y@Left_Braking_Peak

- parameter: Right GRF.y@Right_Braking_Peak
  set: right
  where:
    force: right
  steps:
    - import: Right GRF.y@Right_Braking_Peak

- parameter: Left GRF.y@Left_Propulsion_Peak
  set: left
  where:
    force: left
  steps:
    - import: Left GRF.y@Left_Propulsion_Peak

- parameter: Right GRF.y@Right_Propulsion_Peak
  set: right
  where:
    force: right
  steps:
    - import: Right GRF.y@Right_Propulsion_Peak

# Subject body mass (exported for report)
- parameter: MASS
  steps:
    - import: $bodyMass
